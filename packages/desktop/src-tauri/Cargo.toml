[package]
name = "pokertrainer"
version = "1.0.0"
description = "PokerTrainer desktop application"
authors = ["PokerTrainer"]
edition = "2021"

[lib]
name = "pokertrainer_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
