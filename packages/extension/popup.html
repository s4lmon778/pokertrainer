<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 260px; font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; padding: 12px; }
    h1 { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
    .status-row { display: flex; align-items: center; gap: 6px; font-size: 12px; margin-bottom: 4px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.green { background: #22c55e; }
    .dot.red { background: #ef4444; }
    .dot.yellow { background: #eab308; }
    .label { color: #94a3b8; }
    .value { font-weight: 500; }
    hr { border: none; border-top: 1px solid #1e293b; margin: 8px 0; }
    .btn { display: block; width: 100%; padding: 6px 0; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; font-weight: 500; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .section-title { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  </style>
</head>
<body>
  <h1>♠ PokerBot Bridge</h1>

  <div class="section-title">Connection</div>
  <div class="status-row">
    <span class="dot" id="bridgeDot"></span>
    <span id="bridgeStatus">Checking...</span>
  </div>

  <div class="section-title" style="margin-top:8px;">Table</div>
  <div class="status-row">
    <span class="dot" id="tableDot"></span>
    <span id="tableStatus">Detecting...</span>
  </div>
  <div class="status-row">
    <span class="label">Site:</span>
    <span class="value" id="siteName">—</span>
  </div>

  <hr>

  <button class="btn btn-primary" id="forceScanBtn">Force Scan</button>

  <script src="popup.js"></script>
</body>
</html>
